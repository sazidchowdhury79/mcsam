<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Minecraft 3D Skin Viewer</title>
    <link rel="stylesheet" href="./style.css">
</head>
<body class="bg-gray-950 text-gray-100 h-[100dvh] w-screen overflow-hidden flex flex-col md:flex-row font-sans">
   
   <aside class="w-full md:w-80 h-[55%] md:h-full bg-gray-900 border-r border-gray-800 flex flex-col z-10 overflow-y-auto shrink-0 order-2 md:order-1">
       <div class="p-6 border-b border-gray-800 flex items-center gap-3 sticky top-0 bg-gray-900/95 backdrop-blur z-10">
           <i data-lucide="box" class="w-6 h-6 text-emerald-500"></i>
           <h1 class="text-xl font-bold tracking-tight">Skin Viewer <span class="text-emerald-500">3D</span></h1>
       </div>
       
       <div class="p-6 space-y-8 flex-1">
           <div class="space-y-3">
               <label class="text-xs font-bold text-gray-500 uppercase tracking-wider">Load Player</label>
               <div class="flex gap-2">
                   <input type="text" id="username_input" placeholder="Username" class="w-full bg-gray-950 border border-gray-700 rounded-lg px-3 py-2 text-sm focus:border-emerald-500 outline-none">
                   <button id="fetch_btn" class="bg-emerald-600 hover:bg-emerald-500 px-3 rounded-lg"><i data-lucide="arrow-right" class="w-4 h-4"></i></button>
               </div>
           </div>
           
           <div class="space-y-4">
               <label class="text-xs font-bold text-gray-500 uppercase tracking-wider">Local File</label>
               <div class="relative group border-2 border-dashed border-gray-700 rounded-lg p-4 bg-gray-950/50 hover:border-emerald-500 transition-all text-center">
                   <input type="file" id="file_input" accept="image/png" class="absolute inset-0 w-full h-full opacity-0 cursor-pointer z-10">
                   <i data-lucide="upload-cloud" class="w-6 h-6 text-gray-400 mx-auto mb-2"></i>
                   <span class="text-sm text-gray-300">Choose PNG</span>
               </div>
           </div>
           
           <div class="space-y-4">
               <label class="text-xs font-bold text-gray-500 uppercase tracking-wider">Settings</label>
               <select id="anim_select" class="w-full bg-gray-950 border border-gray-700 rounded-lg px-3 py-2 text-sm outline-none focus:border-emerald-500">
                   <option value="idle">Idle</option>
                   <option value="walk">Walking</option>
                   <option value="run">Running</option>
                   <option value="fly">Flying</option>
               </select>
               <div class="flex items-center justify-between bg-gray-950 border border-gray-700 rounded-lg px-3 py-2">
                   <span class="text-sm text-gray-300">Auto Rotate</span>
                   <input type="checkbox" id="auto_rotate_check" checked class="w-4 h-4 accent-emerald-500">
               </div>
           </div>

           <div class="space-y-3 pt-4 border-t border-gray-800">
               <button id="save_skin_btn" class="w-full bg-emerald-600 hover:bg-emerald-500 text-white px-4 py-2.5 rounded-lg text-sm font-medium flex items-center justify-center gap-2">
                   <i data-lucide="download-cloud" class="w-4 h-4"></i> Save Skin (.png)
               </button>
               <button id="export_glb_btn" class="w-full bg-indigo-600 hover:bg-indigo-500 text-white px-4 py-2.5 rounded-lg text-sm font-medium flex items-center justify-center gap-2">
                   <i data-lucide="download" class="w-4 h-4"></i> Export 3D (.glb)
               </button>
           </div>
       </div>

       <div class="p-4 border-t border-gray-800 bg-gray-900/95">
            <button id="reset_btn" class="text-xs text-gray-500 hover:text-white transition-colors flex items-center justify-center gap-1.5 w-full py-2 bg-gray-800/50 rounded-lg">
                <i data-lucide="rotate-ccw" class="w-3.5 h-3.5"></i> Reset to Steve
            </button>
       </div>
   </aside>
   
   <main class="flex-1 w-full h-[45%] md:h-full relative bg-gray-950 order-1 md:order-2" id="viewer_wrapper">
       <canvas id="skin_container" class="absolute inset-0 w-full h-full"></canvas>
   </main>

   <script type="module" src="./main.js"></script>
</body>
</html>
