<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Minecraft 3D Skin Viewer</title>
    
    <!-- Add import map for three.js and its addons to support GLTFExporter -->
    <script type="importmap">
        {
            "imports": {
                "three": "https://cdn.jsdelivr.net/npm/three@0.158.0/build/three.module.js",
                "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.158.0/examples/jsm/"
            }
        }
    </script>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        /* Custom smooth scrollbar for the sidebar */
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #374151; border-radius: 4px; }
        ::-webkit-scrollbar-thumb:hover { background: #4b5563; }
        
        /* Cursor styles for the 3D canvas */
        #skin_container {
            outline: none;
            cursor: grab;
        }
        #skin_container:active {
            cursor: grabbing;
        }
        
        /* Select element styling */
        select {
            -webkit-appearance: none;
            -moz-appearance: none;
            appearance: none;
            background-image: url("data:image/svg+xml;charset=UTF-8,%3csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24' fill='none' stroke='%239ca3af' stroke-width='2' stroke-linecap='round' stroke-linejoin='round'%3e%3cpolyline points='6 9 12 15 18 9'%3e%3c/polyline%3e%3c/svg%3e");
            background-repeat: no-repeat;
            background-position: right 0.75rem center;
            background-size: 1em;
        }
    </style>
</head>
<body class="bg-gray-950 text-gray-100 h-[100dvh] w-screen overflow-hidden flex flex-col md:flex-row font-sans selection:bg-emerald-500/30">
   
   <!-- Sidebar (Bottom on mobile, Left on desktop) -->
   <aside class="w-full md:w-80 h-[55%] md:h-full bg-gray-900 border-t md:border-t-0 md:border-r border-gray-800 flex flex-col shadow-2xl z-10 overflow-y-auto shrink-0 order-2 md:order-1">
       <!-- Header -->
       <div class="p-6 border-b border-gray-800 flex items-center gap-3 sticky top-0 bg-gray-900/95 backdrop-blur z-10">
           <i data-lucide="box" class="w-7 h-7 text-emerald-500"></i>
           <h1 class="text-xl font-bold tracking-tight">Skin Viewer <span class="text-emerald-500">3D</span></h1>
       </div>
       
       <div class="p-6 space-y-8 flex-1">
           <!-- Player Search -->
           <div class="space-y-3">
               <label class="text-xs font-bold text-gray-500 uppercase tracking-wider">Load Player</label>
               <div class="flex gap-2">
                   <div class="relative flex-1">
                       <i data-lucide="search" class="absolute left-3 top-1/2 -translate-y-1/2 w-4 h-4 text-gray-500"></i>
                       <input type="text" id="username_input" placeholder="Minecraft Username" class="w-full bg-gray-950 border border-gray-700 rounded-lg pl-9 pr-3 py-2.5 text-sm focus:outline-none focus:border-emerald-500 focus:ring-1 focus:ring-emerald-500 transition-colors placeholder:text-gray-600">
                   </div>
                   <button id="fetch_btn" class="bg-emerald-600 hover:bg-emerald-500 text-white px-4 py-2.5 rounded-lg text-sm font-medium transition-colors shadow-lg shadow-emerald-900/20 flex items-center justify-center min-w-[44px]" title="Fetch Player Skin">
                       <i data-lucide="arrow-right" class="w-4 h-4" id="fetch_icon"></i>
                       <i data-lucide="loader-2" class="w-4 h-4 animate-spin hidden" id="fetch_spinner"></i>
                   </button>
               </div>
               <p id="error_msg" class="text-red-400 text-xs hidden font-medium flex items-center gap-1">
                   <i data-lucide="alert-circle" class="w-3.5 h-3.5"></i> Player not found or network error.
               </p>
           </div>
           
           <!-- Uploads -->
           <div class="space-y-4">
               <label class="text-xs font-bold text-gray-500 uppercase tracking-wider">Custom Files</label>
               
               <div class="space-y-3">
                   <!-- Skin Upload -->
                   <div class="relative group">
                       <input type="file" id="file_input" accept="image/png" class="absolute inset-0 w-full h-full opacity-0 cursor-pointer z-10">
                       <div class="border-2 border-dashed border-gray-700 rounded-lg p-4 flex flex-col items-center justify-center gap-2 group-hover:border-emerald-500 group-hover:bg-emerald-500/5 transition-all bg-gray-950/50">
                           <i data-lucide="upload-cloud" class="w-6 h-6 text-gray-400 group-hover:text-emerald-500 transition-colors"></i>
                           <div class="text-sm font-medium text-gray-300 group-hover:text-emerald-400 transition-colors">Upload Skin (.png)</div>
                           <div class="text-[11px] text-gray-500">Classic (64x32) or Modern (64x64)</div>
                       </div>
                   </div>
                   
                   <!-- Cape Upload -->
                   <div class="relative group">
                       <input type="file" id="cape_file_input" accept="image/png" class="absolute inset-0 w-full h-full opacity-0 cursor-pointer z-10">
                       <div class="border-2 border-dashed border-gray-700 rounded-lg p-3 flex items-center justify-center gap-2 group-hover:border-purple-500 group-hover:bg-purple-500/5 transition-all bg-gray-950/50">
                           <i data-lucide="paperclip" class="w-4 h-4 text-gray-400 group-hover:text-purple-500 transition-colors"></i>
                           <div class="text-sm font-medium text-gray-300 group-hover:text-purple-400 transition-colors">Upload Cape (.png)</div>
                       </div>
                   </div>
               </div>
           </div>
           
           <!-- Controls -->
           <div class="space-y-4">
               <label class="text-xs font-bold text-gray-500 uppercase tracking-wider">Model Settings</label>
               
               <div class="space-y-3">
                   <!-- Animation Dropdown -->
                   <div>
                       <label class="text-xs text-gray-400 mb-1.5 block">Animation</label>
                       <select id="anim_select" class="w-full bg-gray-950 border border-gray-700 rounded-lg px-3 py-2.5 text-sm focus:outline-none focus:border-emerald-500 transition-colors text-gray-200">
                           <option value="idle">Idle</option>
                           <option value="walk">Walking</option>
                           <option value="run">Running</option>
                           <option value="fly">Flying</option>
                           <option value="none">None</option>
                       </select>
                   </div>
                   
                   <!-- Auto Rotate Toggle -->
                   <div class="flex items-center justify-between bg-gray-950 border border-gray-700 rounded-lg px-3 py-2.5">
                       <span class="text-sm text-gray-300">Auto Rotate</span>
                       <label class="relative inline-flex items-center cursor-pointer">
                           <input type="checkbox" id="auto_rotate" class="sr-only peer" checked>
                           <div class="w-9 h-5 bg-gray-700 peer-focus:outline-none rounded-full peer peer-checked:after:translate-x-full peer-checked:after:border-white after:content-[''] after:absolute after:top-[2px] after:left-[2px] after:bg-white after:border-gray-300 after:border after:rounded-full after:h-4 after:w-4 after:transition-all peer-checked:bg-emerald-500"></div>
                       </label>
                   </div>
                   
                   <!-- Show Cape as Elytra Toggle -->
                   <div class="flex items-center justify-between bg-gray-950 border border-gray-700 rounded-lg px-3 py-2.5">
                       <span class="text-sm text-gray-300">Equip Elytra</span>
                       <label class="relative inline-flex items-center cursor-pointer">
                           <input type="checkbox" id="cape_elytra" class="sr-only peer">
                           <div class="w-9 h-5 bg-gray-700 peer-focus:outline-none rounded-full peer peer-checked:after:translate-x-full peer-checked:after:border-white after:content-[''] after:absolute after:top-[2px] after:left-[2px] after:bg-white after:border-gray-300 after:border after:rounded-full after:h-4 after:w-4 after:transition-all peer-checked:bg-purple-500"></div>
                       </label>
                   </div>

                   <!-- Background Color -->
                   <div>
                       <label class="text-xs text-gray-400 mb-1.5 block">Scene Background</label>
                       <div class="flex gap-2">
                           <input type="color" id="bg_color" value="#030712" class="h-10 w-full rounded-lg cursor-pointer bg-gray-950 border border-gray-700 p-1">
                       </div>
                   </div>
               </div>
           </div>
           
           <!-- Export -->
           <div class="space-y-4 pt-4 border-t border-gray-800">
               <label class="text-xs font-bold text-gray-500 uppercase tracking-wider">Export</label>
               <button id="export_glb_btn" class="w-full bg-indigo-600 hover:bg-indigo-500 text-white px-4 py-2.5 rounded-lg text-sm font-medium transition-colors shadow-lg shadow-indigo-900/20 flex items-center justify-center gap-2">
                   <i data-lucide="download" class="w-4 h-4"></i> Export to GLB (Blender)
               </button>
           </div>
       </div>
       
       <!-- Footer / Reset -->
       <div class="p-4 border-t border-gray-800 bg-gray-900/95">
            <button id="reset_btn" class="text-xs text-gray-500 hover:text-white transition-colors flex items-center justify-center gap-1.5 w-full py-2 bg-gray-800/50 rounded-lg hover:bg-gray-800">
                <i data-lucide="rotate-ccw" class="w-3.5 h-3.5"></i> Reset to Default
            </button>
       </div>
   </aside>
   
   <!-- Main Viewer (Top on mobile, Right on desktop) -->
   <main class="flex-1 w-full h-[45%] md:h-full relative bg-gray-950 order-1 md:order-2" id="viewer_wrapper">
       <canvas id="skin_container" class="absolute inset-0 w-full h-full"></canvas>
       
       <!-- Interactivity Instructions -->
       <div class="absolute bottom-6 left-1/2 -translate-x-1/2 bg-gray-900/60 backdrop-blur-md border border-gray-700/50 rounded-full px-5 py-2 flex items-center gap-4 text-[11px] font-medium text-gray-300 shadow-xl pointer-events-none transition-opacity duration-500" id="controls_hint">
           <div class="flex items-center gap-1.5"><i data-lucide="mouse-pointer-click" class="w-3.5 h-3.5"></i> Drag to rotate</div>
           <div class="w-1 h-1 rounded-full bg-gray-500"></div>
           <div class="flex items-center gap-1.5"><i data-lucide="arrow-up-down" class="w-3.5 h-3.5"></i> Scroll to zoom</div>
       </div>
   </main>

   <script type="module">
        // Import SkinView3D
        import { SkinViewer, WalkingAnimation, IdleAnimation, RunningAnimation, FlyingAnimation } from 'https://cdn.jsdelivr.net/npm/skinview3d@3.4.1/+esm';
        // Import GLTFExporter from three.js
        import { GLTFExporter } from 'three/addons/exporters/GLTFExporter.js';

        // Initialize Lucide icons
        lucide.createIcons();

        document.addEventListener("DOMContentLoaded", () => {
            const canvas = document.getElementById("skin_container");
            const container = document.getElementById("viewer_wrapper");
            
            // App State
            const defaultSkin = "https://minotar.net/skin/Steve";
            const defaultBg = "#030712"; // matches Tailwind bg-gray-950
            let currentCapeUrl = null;

            // Initialize the 3D Viewer
            const viewer = new SkinViewer({
                canvas: canvas,
                width: container.clientWidth,
                height: container.clientHeight,
                skin: defaultSkin,
                background: defaultBg
            });

            // Initial settings
            viewer.animation = new IdleAnimation();
            viewer.autoRotate = true;
            viewer.autoRotateSpeed = 0.5;

            // Handle Resize efficiently
            const resizeViewer = () => {
                viewer.width = container.clientWidth;
                viewer.height = container.clientHeight;
            };
            window.addEventListener('resize', resizeViewer);
            // Backup resize trigger for mobile layouts settling
            setTimeout(resizeViewer, 100);

            // --- UI Interaction Logic ---

            const fetchBtn = document.getElementById('fetch_btn');
            const usernameInput = document.getElementById('username_input');
            const fetchIcon = document.getElementById('fetch_icon');
            const fetchSpinner = document.getElementById('fetch_spinner');
            const errorMsg = document.getElementById('error_msg');
            const capeElytraCheckbox = document.getElementById('cape_elytra');

            const setLoading = (isLoading) => {
                if (isLoading) {
                    fetchIcon.classList.add('hidden');
                    fetchSpinner.classList.remove('hidden');
                    fetchBtn.disabled = true;
                    errorMsg.classList.add('hidden');
                } else {
                    fetchIcon.classList.remove('hidden');
                    fetchSpinner.classList.add('hidden');
                    fetchBtn.disabled = false;
                }
            };

            // Centralized cape loading method to respect elytra toggle
            const setCape = (url) => {
                currentCapeUrl = url;
                if (!url) {
                    viewer.loadCape(null);
                } else {
                    const isElytra = capeElytraCheckbox.checked;
                    viewer.loadCape(url, { backEquipment: isElytra ? 'elytra' : 'cape' });
                }
            };

            // Fetch Player by Username
            const loadPlayer = async () => {
                const username = usernameInput.value.trim();
                if (!username) return;
                
                setLoading(true);
                try {
                    // Get UUID using Ashcon API for reliable Crafatar fetching
                    const res = await fetch(`https://api.ashcon.app/mojang/v2/user/${username}`);
                    
                    if (res.ok) {
                        const data = await res.json();
                        const uuid = data.uuid;
                        
                        // Load high-quality skin from Crafatar
                        viewer.loadSkin(`https://crafatar.com/skins/${uuid}`);
                        
                        // Check if the user has a cape via API response
                        if (data.textures && data.textures.cape) {
                            setCape(`https://crafatar.com/capes/${uuid}`);
                        } else {
                            setCape(null);
                        }
                    } else {
                        // Fallback: If not found on API, try Minotar directly
                        throw new Error('API Lookup Failed');
                    }
                } catch (e) {
                    console.log("Falling back to standard Minotar skin...", e);
                    viewer.loadSkin(`https://minotar.net/skin/${username}`);
                    setCape(null);
                    
                    // Show error only if it's completely unresolvable or we want to inform them cape is definitely missing
                    // We'll leave it hidden since Minotar fallback usually works for standard skins
                } finally {
                    setLoading(false);
                }
            };

            fetchBtn.addEventListener('click', loadPlayer);
            usernameInput.addEventListener('keypress', (e) => {
                if (e.key === 'Enter') loadPlayer();
            });

            // Local Upload: Skin
            document.getElementById('file_input').addEventListener('change', (e) => {
                const file = e.target.files[0];
                if (!file) return;
                const reader = new FileReader();
                reader.onload = (event) => viewer.loadSkin(event.target.result);
                reader.readAsDataURL(file);
                e.target.value = ''; // Reset input
            });

            // Local Upload: Cape
            document.getElementById('cape_file_input').addEventListener('change', (e) => {
                const file = e.target.files[0];
                if (!file) return;
                const reader = new FileReader();
                reader.onload = (event) => setCape(event.target.result);
                reader.readAsDataURL(file);
                e.target.value = ''; // Reset input
            });

            // Animation Selector
            document.getElementById('anim_select').addEventListener('change', (e) => {
                const val = e.target.value;
                if (val === 'idle') viewer.animation = new IdleAnimation();
                else if (val === 'walk') viewer.animation = new WalkingAnimation();
                else if (val === 'run') viewer.animation = new RunningAnimation();
                else if (val === 'fly') viewer.animation = new FlyingAnimation();
                else viewer.animation = null;
            });

            // Auto Rotate Toggle
            document.getElementById('auto_rotate').addEventListener('change', (e) => {
                viewer.autoRotate = e.target.checked;
            });

            // Elytra Toggle
            capeElytraCheckbox.addEventListener('change', () => {
                setCape(currentCapeUrl); // Reloads cape with/without Elytra model parameter
            });

            // Background Color Picker
            document.getElementById('bg_color').addEventListener('input', (e) => {
                viewer.background = e.target.value;
                document.getElementById('viewer_wrapper').style.backgroundColor = e.target.value;
            });

            // GLB Export Logic
            document.getElementById('export_glb_btn').addEventListener('click', () => {
                const exporter = new GLTFExporter();
                
                // Exporting the playerObject directly to isolate the character from the scene background
                exporter.parse(
                    viewer.playerObject,
                    (gltf) => {
                        const blob = new Blob([gltf], { type: 'application/octet-stream' });
                        const url = URL.createObjectURL(blob);
                        const link = document.createElement('a');
                        link.style.display = 'none';
                        link.href = url;
                        
                        // Use loaded username for the filename, otherwise fallback
                        const name = usernameInput.value.trim() || 'minecraft_skin';
                        link.download = `${name}_model.glb`;
                        
                        document.body.appendChild(link);
                        link.click();
                        document.body.removeChild(link);
                        URL.revokeObjectURL(url);
                    },
                    (error) => {
                        console.error('An error happened during GLB export:', error);
                        alert('Failed to export GLB. Check the console for details.');
                    },
                    { binary: true } // Ensure it exports as a single .glb file instead of .gltf + assets
                );
            });

            // Reset Everything
            document.getElementById('reset_btn').addEventListener('click', () => {
                viewer.loadSkin(defaultSkin);
                setCape(null);
                
                viewer.animation = new IdleAnimation();
                document.getElementById('anim_select').value = 'idle';
                
                viewer.autoRotate = true;
                document.getElementById('auto_rotate').checked = true;
                
                capeElytraCheckbox.checked = false;
                
                viewer.background = defaultBg;
                document.getElementById('bg_color').value = defaultBg;
                document.getElementById('viewer_wrapper').style.backgroundColor = defaultBg;
                
                usernameInput.value = '';
                errorMsg.classList.add('hidden');
            });
            
            // Fade out controls hint after first interaction
            canvas.addEventListener('mousedown', () => {
                document.getElementById('controls_hint').style.opacity = '0';
            }, { once: true });
            
            canvas.addEventListener('touchstart', () => {
                document.getElementById('controls_hint').style.opacity = '0';
            }, { once: true });
        });
   </script>
</body>
</html>
